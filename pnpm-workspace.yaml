packages:
  - apps/*
  - packages/*
  - tests/e2e

# pnpm 10 blocks dependency build scripts by default; these are the only
# packages allowed to run them (native compilation / binary setup).
onlyBuiltDependencies:
  - '@discordjs/opus'
  - argon2
  - esbuild

# Central version catalog — every workspace package references "catalog:".
# Update versions here, in one place only. Pins verified 2026-06-13.
catalog:
  # Discord (voice requires Node >=22.12; no sodium package needed — Node's
  # native crypto covers aead_aes256_gcm_rtpsize, DAVE comes via @snazzah/davey)
  discord.js: ^14.26.4
  '@discordjs/voice': ^0.19.2
  '@discordjs/opus': ^0.10.0
  prism-media: ^1.3.5

  # Web / admin (Fastify v5 line)
  fastify: ^5.8.5
  '@fastify/secure-session': ^8.3.0
  '@fastify/csrf-protection': ^8.0.0
  '@fastify/rate-limit': ^11.0.0
  '@fastify/formbody': ^8.0.2
  '@fastify/multipart': ^9.0.3
  '@fastify/static': ^9.1.3
  '@fastify/view': ^12.0.0
  '@fastify/sensible': ^6.0.4
  ejs: ^6.0.1

  # Database
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
  pg: ^8.21.0
  '@types/pg': ^8.20.0

  # Security / utils
  argon2: ^0.44.0
  zod: ^4.4.3
  undici: ^8.4.1
  ipaddr.js: ^2.4.0

  # Community modules
  '@resvg/resvg-js': ^2.6.2
  luxon: ^3.7.2
  '@types/luxon': ^3.7.1
  cron-parser: ^5.4.0

  # Logging
  pino: ^10.3.1
  pino-pretty: ^13.1.3

  # Tooling
  typescript: ^5.9.2
  tsx: ^4.22.4
  tsup: ^8.5.1
  vitest: ^4.1.8
  eslint: ^10.5.0
  typescript-eslint: ^8.61.0
  '@eslint/js': ^10.0.1
  prettier: ^3.8.4
  '@types/node': ^24.0.0
  '@types/ejs': ^3.1.5

  # E2E — version MUST exactly match the mcr.microsoft.com/playwright image tag
  '@playwright/test': 1.60.0
